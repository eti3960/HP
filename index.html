<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP</title>
    <style>
        :root { --accent: #00ff88; --text: #ffffff; --blue: #00d4ff; }
        body { 
            font-family: sans-serif; 
            background-color: #808080; /* Gris 50% */
            display: flex; justify-content: center; padding: 20px; color: var(--text);
        }
        #calc { 
            background: #333; padding: 25px; border-radius: 15px; 
            width: 100%; max-width: 480px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-top: 0; color: var(--accent); text-transform: uppercase; }
        label { display: block; margin: 12px 0 5px; font-size: 0.85em; font-weight: bold; color: #bbb; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #444; color: white; font-size: 16px; box-sizing: border-box; 
            margin-bottom: 5px;
        }
        .res-box { 
            background: #222; padding: 15px; border-radius: 10px; 
            margin-top: 20px; border-left: 5px solid var(--accent); 
        }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .val { font-weight: bold; color: var(--accent); font-size: 1.2em; }
        
        /* Style du tableau de paliers */
        .paliers-table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.85em; background: #2a2a2a; border-radius: 8px; overflow: hidden; }
        .paliers-table th { background: #444; color: var(--blue); padding: 10px; text-align: left; }
        .paliers-table td { padding: 10px; border-bottom: 1px solid #333; }
        .paliers-table tr:last-child td { border: none; }
        .palier-qty { font-weight: bold; }
        .palier-total { color: var(--accent); }

        .info { font-size: 0.85em; color: #bbb; border-top: 1px solid #444; padding-top: 10px; margin-top: 15px; line-height: 1.6; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="calc">
    <h2>HP</h2>

    <label>Largeur Étiquette (mm)</label>
    <input type="number" id="largeur" value="50" oninput="calculer()">

    <label>Hauteur Étiquette (mm)</label>
    <input type="number" id="hauteur" value="50" oninput="calculer()">

    <label>Quantité demandée</label>
    <input type="number" id="quantite" value="1000" oninput="calculer()">

    <label>Matière (Laize 330)</label>
    <select id="matiere" onchange="calculer()">
        <option value="0.45">Papier blanc</option>
        <option value="0.65">Papier structuré</option>
        <option value="0.90">Papier premium vin</option>
        <option value="0.75">Polypropylène blanc</option>
    </select>

    <label>Type d'impression</label>
    <select id="impression" onchange="calculer()">
        <option value="1.0">Quadri (CMYK)</option>
        <option value="1.45">Quadri + Blanc couvrant</option>
        <option value="0.80">Noir seul</option>
        <option value="0.50">Sans impression (Neutre)</option>
    </select>

    <label>Ennoblissement (Indicatif)</label>
    <select id="ennoblissement">
        <option value="0">Aucun</option>
        <option value="160">Dorure à chaud (160 CHF)</option>
        <option value="60">Vernis sélectif (60 CHF)</option>
        <option value="350">Galbe (350 CHF)</option>
    </select>

    <div class="res-box">
        <div class="res-row">
            <span>Prix Total HT :</span>
            <span class="val" id="total">-- CHF</span>
        </div>
        <div class="res-row">
            <span>Prix au mille (PAM) :</span>
            <span class="val" id="pam" style="color: var(--blue);">-- CHF</span>
        </div>
    </div>

    <table class="paliers-table" id="tablePaliers">
        <thead>
            <tr>
                <th>Qté</th>
                <th>Total HT</th>
                <th>PAM</th>
            </tr>
        </thead>
        <tbody id="paliersBody">
            </tbody>
    </table>

    <div class="info" id="stats">
        Saisissez les données...
    </div>
</div>

<script>
// Fonction moteur de calcul pour réutilisation
function moteurCalcul(l, h, q, mat, imp) {
    const LAIZE_MAX = 330;
    const MARGE_TECH = 10; 
    const GAP = 4;

    let posesLaize = Math.floor((LAIZE_MAX - MARGE_TECH) / (l + GAP));
    if (posesLaize < 1) posesLaize = 1;

    let nbRangs = Math.ceil(q / posesLaize);
    let ml = (nbRangs * (h + GAP)) / 1000;

    let surfaceM2 = ml * 0.33;
    let prixBase = surfaceM2 * mat * imp * 110;

    let coeff = 1.0;
    if (q >= 100000) coeff = 0.50;
    else if (q >= 50000) coeff = 0.65;
    else if (q >= 10000) coeff = 0.80;

    let total = (prixBase * coeff) + 120;
    if (total < 150) total = 150;
    
    let pam = (total / q) * 1000;
    
    return { total, pam, posesLaize, ml };
}

function calculer() {
    let l = parseFloat(document.getElementById("largeur").value) || 0;
    let h = parseFloat(document.getElementById("hauteur").value) || 0;
    let qBase = parseFloat(document.getElementById("quantite").value) || 0;
    let mat = parseFloat(document.getElementById("matiere").value);
    let imp = parseFloat(document.getElementById("impression").value);

    if (l > 0 && h > 0 && qBase > 0) {
        // 1. Calcul principal
        let resMain = moteurCalcul(l, h, qBase, mat, imp);
        document.getElementById("total").innerText = resMain.total.toFixed(2) + " CHF";
        document.getElementById("pam").innerText = resMain.pam.toFixed(2) + " CHF";
        document.getElementById("stats").innerHTML = 
            "Poses de front : <span class='highlight'>" + resMain.posesLaize + "</span> | " +
            "Métrage : <span class='highlight'>" + resMain.ml.toFixed(2) + " m</span>";

        // 2. Calcul des paliers
        let paliers = [-500, 500, 1000, 2000, 5000];
        let htmlPaliers = "";
        
        paliers.forEach(diff => {
            let qPalier = qBase + diff;
            if (qPalier > 0) {
                let resP = moteurCalcul(l, h, qPalier, mat, imp);
                htmlPaliers += `<tr>
                    <td class="palier-qty">${qPalier}</td>
                    <td class="palier-total">${resP.total.toFixed(2)} CHF</td>
                    <td style="color:#00d4ff">${resP.pam.toFixed(2)}</td>
                </tr>`;
            }
        });
        document.getElementById("paliersBody").innerHTML = htmlPaliers;
    }
}

calculer();
</script>

</body>
</html>
