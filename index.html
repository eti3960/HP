<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP</title>
    <style>
        :root { --accent: #00ff88; --text: #ffffff; }
        body { 
            font-family: sans-serif; 
            background-color: #808080; /* Gris 50% */
            display: flex; justify-content: center; padding: 20px; color: var(--text);
        }
        #calc { 
            background: #333; padding: 25px; border-radius: 15px; 
            width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-top: 0; color: var(--accent); }
        label { display: block; margin: 12px 0 5px; font-size: 0.9em; font-weight: bold; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #444; color: white; font-size: 16px; box-sizing: border-box; 
        }
        .res-box { 
            background: #222; padding: 15px; border-radius: 10px; 
            margin-top: 20px; border-left: 5px solid var(--accent); 
        }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .val { font-weight: bold; color: var(--accent); font-size: 1.2em; }
        .info { font-size: 0.85em; color: #bbb; border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; line-height: 1.5; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="calc">
    <h2>HP</h2>

    <label>Largeur (mm)</label>
    <input type="number" id="largeur" value="50" oninput="calculer()">

    <label>Hauteur (mm)</label>
    <input type="number" id="hauteur" value="50" oninput="calculer()">

    <label>Quantité</label>
    <input type="number" id="quantite" value="1000" oninput="calculer()">

    <label>Matière (Laize 330)</label>
    <select id="matiere" onchange="calculer()">
        <option value="0.45">Papier blanc</option>
        <option value="0.65">Papier structuré</option>
        <option value="0.90">Papier premium vin</option>
        <option value="0.75">Polypropylène blanc</option>
    </select>

    <label>Type d'impression</label>
    <select id="impression" onchange="calculer()">
        <option value="0.5">Sans impression (Neutre)</option>
        <option value="0.8">Noir</option>
        <option value="1.0">Quadri</option>
        <option value="1.4">Quadri + Blanc couvrant</option>
    </select>

    <label>Ennoblissement (Indicatif)</label>
    <select id="ennoblissement">
        <option value="0">Aucun</option>
        <option value="160">Dorure à chaud (160 CHF)</option>
        <option value="60">Vernis sélectif (60 CHF)</option>
        <option value="350">Galbe (350 CHF)</option>
    </select>

    <div class="res-box">
        <div class="res-row">
            <span>Prix Total :</span>
            <span class="val" id="total">-- CHF</span>
        </div>
        <div class="res-row">
            <span>Prix au mille :</span>
            <span class="val" id="pam" style="color: #00d4ff;">-- CHF</span>
        </div>
        <div class="info" id="stats">
            Poses : --
        </div>
    </div>
</div>

<script>
function calculer() {
    let l = parseFloat(document.getElementById("largeur").value) || 0;
    let h = parseFloat(document.getElementById("hauteur").value) || 0;
    let q = parseFloat(document.getElementById("quantite").value) || 0;
    let mat = parseFloat(document.getElementById("matiere").value);
    let imp = parseFloat(document.getElementById("impression").value);

    if (l > 0 && h > 0 && q > 0) {
        const LAIZE_MAX = 330;
        const BORD_SURETE = 10; // Marge technique Indigo
        const GAP = 4; // Espace entre étiquettes imposé (avance et laize)

        // 1. Poses en laize (Largeur)
        let posesLaize = Math.floor((LAIZE_MAX - BORD_SURETE) / (l + GAP));
        if (posesLaize < 1) posesLaize = 1;

        // 2. Métrage linéaire (Avance)
        let nbRangs = Math.ceil(q / posesLaize);
        let ml = (nbRangs * (h + GAP)) / 1000;

        // 3. Calcul du prix (Logique Indigo 6800)
        let surfaceM2 = ml * 0.33;
        let prixBase = surfaceM2 * mat * imp * 100; // Facteur d'échelle

        // Dégressivité volume
        let coeff = 1.0;
        if (q >= 100000) coeff = 0.5;
        else if (q >= 50000) coeff = 0.65;
        else if (q >= 10000) coeff = 0.8;

        let fraisFixes = 120;
        let total = (prixBase * coeff) + fraisFixes;
        
        // Minimum de facturation
        if (total < 150) total = 150;

        let pam = (total / q) * 1000;

        // Affichage des résultats
        document.getElementById("total").innerText = total.toFixed(2) + " CHF";
        document.getElementById("pam").innerText = pam.toFixed(2) + " CHF";
        document.getElementById("stats").innerHTML = 
            "Poses de front (Laize) : <span class='highlight'>" + posesLaize + "</span><br>" +
            "Métrage linéaire : <span class='highlight'>" + ml.toFixed(2) + " m</span><br>" +
            "Espacement (Gaps) : <span class='highlight'>" + GAP + " mm</span>";
    }
}

// Lancement automatique au chargement
calculer();
</script>

</body>
</html>
